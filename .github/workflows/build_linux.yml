name: Build Simple Example for Linux 

on:
  push:
    branches:
      # Trigger script on push to 'development' branch
      #- development
      # Trigger script on push to 'main' branch
      - main
    paths:
      # Trigger if this workflow file changes
      - '.github/workflows/build_linux.yml'
      # Trigger script on push to raspberry_pi simple example
      - 'examples/simple/common'
      - 'examples/simple/libft4222'
      - 'examples/simple/libmpsse'
      - 'examples/simple/STM32CUBE_CMake_MiniSTM32H7xx'
  # Add "Run workflow" button
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 1
      matrix:
        port: [libft4222, libmpsse, STM32CUBE_CMake_MiniSTM32H7xx]
        eve: [ 
          {build: build-1-QVGA , DISPLAY_RES: QVGA, FT8XX_TYPE: FT800, PANEL_TYPE: NO_PANEL , MODULE_TYPE: NO_MODULE }, 
          {build: build-2-0413-11A , DISPLAY_RES: NO_RES, FT8XX_TYPE: FT813, PANEL_TYPE: DP_0431_11A , MODULE_TYPE: NO_MODULE }, 
          {build: build-3-WVGA , DISPLAY_RES: WVGA, FT8XX_TYPE: BT815, PANEL_TYPE: NO_PANEL , MODULE_TYPE: NO_MODULE }, 
          {build: build-4-IDM20407A , DISPLAY_RES: NO_RES, FT8XX_TYPE: NO_FT8XX, PANEL_TYPE: NO_PANEL , MODULE_TYPE: IDM20407A }, 
          {build: build-5-WUXGA , DISPLAY_RES: WUXGA, FT8XX_TYPE: BT820, PANEL_TYPE: NO_PANEL , MODULE_TYPE: NO_MODULE }, 
        ]
      
    steps:
    
    - uses: actions/checkout@v6

    - name: Get libFTD2XX, libFT4222 and libMPSSE-SPI libraries
      id: ftdicache-restore
      uses: actions/cache/restore@v5
      with:
        path: |
         '~/lib'
        key: ftdicachelib1
    
    - name: Get libFTD2XX, libFT4222 and libMPSSE-SPI libraries
      if: steps.ftdicache-restore.outputs.cache-hit != 'true'
      run: |
        mkdir lib
        cd lib
        curl --insecure -O "https://ftdichip.com/wp-content/uploads/2025/11/libftd2xx-linux-x86_64-1.4.34.tgz"
        curl --insecure -O "https://ftdichip.com/wp-content/uploads/2025/04/libft4222-linux-1.4.4.232.zip"
        unzip libft4222-linux-1.4.4.232.zip
        rm libft4222-linux-1.4.4.232.zip
        curl --insecure -O "https://ftdichip.com/wp-content/uploads/2025/08/libmpsse-x86_64-1.0.8.tgz"
        ls -l

    - name: Cache libFTD2XX, libFT4222 and libMPSSE-SPI libraries
      id: ftdicache-save
      if: always() && steps.ftdicache-restore.outputs.cache-hit != 'true'
      uses: actions/cache/save@v5
      with:
        path: |
         '~/lib'
        key: ftdicachelib1
          
    - name: Setup gcc-arm-none-eabi environment
      #if {{ matrix.port == 'STM32CUBE_CMake_MiniSTM32H7xx' }}
      uses: carlosperate/arm-none-eabi-gcc-action@v1
      
      #run: sudo apt-get update && sudo apt-get install gcc-arm-none-eabi

    - name: Setup libFTD2XX library
      #if matrix.port == 'libmpsse' || matrix.port == 'libft4222'
      run: |
          if ${{ matrix.port == 'libmpsse' || matrix.port == 'libft4222' }}; then
          cd lib
          tar xfvz libftd2xx-linux-x86_64-1.4.34.tgz
          cd linux-x86_64/
          sudo cp libftd2xx.* /usr/local/lib
          sudo chmod 0755 /usr/local/lib/libftd2xx.so.1.4.34
          sudo ln -sf /usr/local/lib/libftd2xx.so.1.4.34 /usr/local/lib/libftd2xx.so
          sudo cp ftd2xx.h /usr/local/include
          sudo cp WinTypes.h /usr/local/include
          cd ..
          fi

    - name: Setup libMPSSE-SPI library
      #if matrix.port == 'libmpsse'
      run: |
          if ${{ matrix.port == 'libmpsse' }}; then
          cd lib
          tar xfvz libmpsse-x86_64-1.0.8.tgz
          cd release
          chmod +x install_libmpsse.sh
          ./install_libmpsse.sh
          cd ..
          fi

    - name: Setup libFT4222 library
      if: matrix.port == 'libft4222'
      run: |
          if ${{ matrix.port == 'libft4222' }}; then
          cd lib
          tar -xvf libft4222-linux-1.4.4.232.tgz
          sudo ./install4222.sh
          fi

    # Test using matrix
    - name: Configure CMake for libFT4222 Linux ${{ matrix.eve.MODULE_TYPE }} ${{ matrix.eve.PANEL_TYPE }} ${{ matrix.eve.DISPLAY_RES }} ${{ matrix.eve.FT8XX_TYPE }} ${{env.BUILD_TYPE}}
      run: cmake -B ${{ matrix.eve.build }} -S . -DMODULE_TYPE=${{ matrix.eve.MODULE_TYPE }} -DPANEL_TYPE=${{ matrix.eve.PANEL_TYPE }} -DFT8XX_TYPE=${{ matrix.eve.FT8XX_TYPE }} -DDISPLAY_RES=${{ matrix.eve.DISPLAY_RES }} -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/libft4222

    - name: Build for libFT4222 Linux ${{ matrix.eve.MODULE_TYPE }} ${{ matrix.eve.PANEL_TYPE }} ${{ matrix.eve.DISPLAY_RES }} ${{ matrix.eve.FT8XX_TYPE }} ${{env.BUILD_TYPE}}
      run: cmake --build ${{ matrix.eve.build }} 
      working-directory: ${{github.workspace}}/examples/simple/libft4222

