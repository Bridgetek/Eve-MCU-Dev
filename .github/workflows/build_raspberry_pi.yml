name: Build Simple Example for Raspberry Pi and RP2040 (Pico)

on:
  push:
    branches:
      # Trigger script on push to 'development' branch
      #- development
      # Trigger script on push to 'main' branch
      - main
    paths:
      # Trigger if this workflow file changes
      - '.github/workflows/build_raspberry_pi.yml'
      # Trigger script on push to raspberry_pi simple example
      - 'examples/simple/common'
      - 'examples/simple/raspberry_pi'
      - 'examples/simple/pico'
  # Add "Run workflow" button
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: install build packages
      run: sudo apt-get update && sudo apt-get install gcc-arm-none-eabi libnewlib-arm-none-eabi g++ libstdc++-arm-none-eabi-newlib gcc-arm-linux-gnueabihf libgpiod-dev

    - name: Get SDK and add PICO_SDK_PATH
      run: git clone https://github.com/raspberrypi/pico-sdk.git && echo "PICO_SDK_PATH=$GITHUB_WORKSPACE/pico-sdk" >> $GITHUB_ENV
     
    - name: Init submodules to get tinyUSB stack
      run: ls && cd pico-sdk && git submodule update --init && cd ..
      
    # Test BT820 (EVE API 5)
    - name: Configure CMake for Raspberry Pi Linux on BT820 with WUXGA panel (DP_1012_01A)
      run: cmake -B build820WUXGA -S . -DDISPLAY_RES=WUXGA -DFT8XX_TYPE=BT820 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    - name: Build for Raspberry Pi Linux on BT820 with WUXGA panel (DP_1012_01A)
      run: cmake --build build820WUXGA
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    # Test BT816 (EVE API 3)
    - name: Configure CMake for Raspberry Pi Linux on IDM20407A module (BT816 with WVGA resolution DP_0701_11A panel)
      run: cmake -B buildIDM20407A -S . -DMODULE_TYPE=IDM20407A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    - name: Build for Raspberry Pi Linux on IDM20407A module on (BT816 with WVGA resolution DP_0701_11A panel)
      run: cmake --build buildIDM20407A
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    # Test FT813 (EVE API 2 SUB API 1)
    - name: Configure CMake for Raspberry Pi Linux on FT813 with DP_0501_01A panel (WVGA)
      run: cmake -B build813WVGA -S . -DFT8XX_TYPE=FT813 -DPANEL_TYPE=DP_0501_01A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    - name: Build for Raspberry Pi Linux on IDM20407A module on FT813 with DP_0501_01A panel (WVGA)
      run: cmake --build build813WVGA
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    # Test FT800 (EVE API 1)
    - name: Configure CMake for Raspberry Pi Linux on VM800C43A (FT800 with WQVGA resolution DP-0431-11A panel)
      run: cmake -B build800C43A -S . -DFT8XX_TYPE=FT813 -DPANEL_TYPE=DP_0501_01A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    - name: Build for Raspberry Pi Linux on VM800C43A (FT800 with WQVGA resolution DP-0431-11A panel)
      run: cmake --build build800C43A
      working-directory: ${{github.workspace}}/examples/simple/raspberry_pi

    # Test BT820 (EVE API 5)
    - name: Configure CMake for Raspberry Pi Pico on BT820 with WUXGA panel (DP_1012_01A)
      run: cmake -B build820WUXGA -S . -DDISPLAY_RES=WUXGA -DFT8XX_TYPE=BT820 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/pico

    - name: Build for Raspberry Pi Pico on BT820 with WUXGA panel (DP_1012_01A)
      run: cmake --build build820WUXGA
      working-directory: ${{github.workspace}}/examples/simple/pico

    # Test BT816 (EVE API 3)
    - name: Configure CMake for Raspberry Pi Pico on IDM20407A module (BT816 with WVGA resolution DP_0701_11A panel)
      run: cmake -B buildIDM20407A -S . -DMODULE_TYPE=IDM20407A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/pico

    - name: Build for Raspberry Pi Pico on IDM20407A module on (BT816 with WVGA resolution DP_0701_11A panel)
      run: cmake --build buildIDM20407A
      working-directory: ${{github.workspace}}/examples/simple/pico

    # Test FT813 (EVE API 2 SUB API 1)
    - name: Configure CMake for Raspberry Pi Pico on FT813 with DP_0501_01A panel (WVGA)
      run: cmake -B build813WVGA -S . -DFT8XX_TYPE=FT813 -DPANEL_TYPE=DP_0501_01A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/pico

    - name: Build for Raspberry Pi Pico on IDM20407A module on FT813 with DP_0501_01A panel (WVGA)
      run: cmake --build build813WVGA
      working-directory: ${{github.workspace}}/examples/simple/pico

    # Test FT800 (EVE API 1)
    - name: Configure CMake for Raspberry Pi Pico on VM800C43A (FT800 with WQVGA resolution DP-0431-11A panel)
      run: cmake -B build800C43A -S . -DFT8XX_TYPE=FT813 -DPANEL_TYPE=DP_0501_01A -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
      working-directory: ${{github.workspace}}/examples/simple/pico

    - name: Build for Raspberry Pi Pico on VM800C43A (FT800 with WQVGA resolution DP-0431-11A panel)
      run: cmake --build build800C43A
      working-directory: ${{github.workspace}}/examples/simple/pico
